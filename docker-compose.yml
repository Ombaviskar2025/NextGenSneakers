version: '3.8'

services:
  # 1. PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: marketplace_db
    restart: always
    environment:
      POSTGRES_DB: multivendor_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Auto-mount schema and seed script on launch
      - ./db_schema.sql:/docker-entrypoint-initdb.d/1_schema.sql
      - ./seeds.sql:/docker-entrypoint-initdb.d/2_seeds.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d multivendor_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Node.js Express Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: marketplace_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - PGHOST=db
      - PGUSER=postgres
      - PGDATABASE=multivendor_db
      - PGPASSWORD=postgres
      - PGPORT=5432
      - JWT_SECRET=default_access_token_secret_398284729384
      - JWT_REFRESH_SECRET=default_refresh_token_secret_471928473928
      - ACCESS_TOKEN_EXPIRY=15m
      - REFRESH_TOKEN_EXPIRY=7d
      - EMAIL_HOST=smtp.mailtrap.io
      - EMAIL_PORT=2525
      - EMAIL_USER=smtp_username_placeholder
      - EMAIL_PASS=smtp_password_placeholder
      - EMAIL_FROM=noreply@platform.com
      - STRIPE_SECRET_KEY=sk_test_placeholder
      - STRIPE_WEBHOOK_SECRET=whsec_placeholder
      - RAZORPAY_KEY_ID=rzp_test_placeholder
      - RAZORPAY_KEY_SECRET=rzp_secret_placeholder
      - GEMINI_API_KEY=gemini_api_key_placeholder
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_uploads:/usr/src/app/public/uploads

  # 3. React Frontend Service served by Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: marketplace_frontend
    restart: always
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local
  backend_uploads:
    driver: local
