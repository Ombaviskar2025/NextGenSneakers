<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AIRVERSE is an enterprise-grade multi-vendor e-commerce platform similar to Amazon, Flipkart, and Etsy. Buy and sell electronics, handcrafted items, and home decor." />
    <meta name="keywords" content="e-commerce, multi-vendor, marketplace, electronics, handmade, shop, buy, sell" />
    <meta name="author" content="AIRVERSE Inc." />
    <title>AIRVERSE | Multi-Vendor E-Commerce Platform</title>

    <!-- 3D Performance: DNS preconnect for Sketchfab embeds -->
    <link rel="preconnect" href="https://sketchfab.com" crossorigin />
    <link rel="preconnect" href="https://static.sketchfab.com" crossorigin />
    <link rel="dns-prefetch" href="https://sketchfab.com" />
    <link rel="dns-prefetch" href="https://static.sketchfab.com" />

    <!-- 3D Performance: Preload hero placeholder for instant display -->
    <link rel="preload" href="/hero-shoe.png" as="image" />

    <!-- 3D Performance: Prefetch GLB model for Innovation page -->
    <link rel="prefetch" href="/models/shoe.glb" as="fetch" crossorigin />
  </head>
  <body class="transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
